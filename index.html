<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issues Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="min-h-screen flex items-center justify-center bg-base-200">

<div class="bg-base-100 border border-base-300 rounded-xl w-96 p-8 shadow-lg">

<div class="flex flex-col items-center mb-4">
<img src="assets/github-logo.png" class="w-16 mb-3">

<h2 class="text-2xl font-bold text-center">
GitHub Issues Tracker
</h2>

<p class="text-gray-500 text-sm text-center mt-1">
Sign in to manage your issues
</p>
</div>

<label class="label">
<span class="label-text">Username</span>
</label>

<input id="name"
type="text"
class="input input-bordered w-full"
placeholder="Enter Username"
/>

<label class="label mt-3">
<span class="label-text">Password</span>
</label>

<input id="password"
type="password"
class="input input-bordered w-full"
placeholder="Enter Password"
/>

<p id="errorMsg" class="text-red-500 text-sm mt-2 hidden">
Invalid username or password
</p>

<button id="loginBtn" class="btn btn-primary w-full mt-4">
Sign In
</button>

<div class="text-center text-gray-400 my-4">
OR
</div>

<div class="text-center text-sm">
<p class="text-gray-500">Demo Credentials</p>

<p class="mt-1">
Username: <span class="font-semibold">admin</span>
</p>

<p>
Password: <span class="font-semibold">admin123</span>
</p>
</div>

</div>

<script src="login.js"></script>

</body>
</html>
